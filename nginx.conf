events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 8081;
        root /var/www/ecomus;
        index index.html;
        location / {
            try_files $uri $uri/ =404;
        }
    }

    server {
        listen 8082;
        root /var/www/lawfirm;
        index index.html;
        location / {
            try_files $uri $uri/ =404;
        }
    }

    server {
        listen 8083;
        root /var/www/tour;
        index index.html;
        location / {
            try_files $uri $uri/ =404;
        }
    }

    server {
        listen 8084;
        root /var/www/lawful;
        index index.html;
        location / {
            try_files $uri $uri/ =404;
        }
    }

    server {
        listen 8085;
        root /var/www/psylogy;
        index index.html;
        location / {
            try_files $uri $uri/ =404;
        }
    }

    server {
        listen 8086;
        root /var/www/lawride;
        index index.html;
        location / {
            try_files $uri $uri/ =404;
        }
    }

    server {
        listen 8087;
        root /var/www/law-firm;
        index index.html;
        location / {
            try_files $uri $uri/ =404;
        }
    }
}
